spring:
  application:
    name: learning-clinic

  # Database - H2 for development
  datasource:
    url: jdbc:h2:mem:learningclinic;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # PostgreSQL for production (commented out)
  # datasource:
  #   url: jdbc:postgresql://localhost:5432/learningclinic
  #   username: postgres
  #   password: password
  #   driver-class-name: org.postgresql.Driver
  # jpa:
  #   hibernate:
  #     ddl-auto: validate
  #   properties:
  #     hibernate:
  #       dialect: org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt:
  secret: learning-clinic-secret-key-for-jwt-token-generation-minimum-256-bits-required
  expiration: 86400000  # 24 hours in milliseconds

# Server Configuration
server:
  port: 8080

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Logging
logging:
  level:
    com.learningclinic: DEBUG
    org.springframework.security: DEBUG
